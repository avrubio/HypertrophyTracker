<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💪 Hypertrophy + Aerial Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: #1A1A2E;
            color: white;
            padding: 30px;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .controls {
            background: #1A1A2E;
            color: white;
            padding: 20px 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            border-bottom: 1px solid #333;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 14px;
            font-weight: 600;
            color: #FFD700;
        }

        .control-group select,
        .control-group input {
            padding: 10px 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            background: #FFFDE7;
            font-weight: bold;
        }

        .info-banner {
            background: #FFFBF0;
            border-left: 4px solid #FFD700;
            padding: 12px 16px;
            margin: 0 30px 20px 30px;
            border-radius: 4px;
            font-size: 13px;
            color: #666;
        }

        .table-wrapper {
            background: white;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: #0F3460;
            color: white;
            position: sticky;
            top: 0;
        }

        th {
            padding: 14px;
            text-align: left;
            font-weight: 600;
            border-right: 1px solid #ddd;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid #eee;
            border-right: 1px solid #eee;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        tbody tr:nth-child(odd) {
            background: #fafafa;
        }

        .exercise-name {
            font-weight: 600;
            color: #1A1A2E;
        }

        .set-num {
            text-align: center;
            font-weight: 600;
        }

        .reps {
            text-align: center;
            background: #f0f0f0;
        }

        .rir {
            text-align: center;
            background: #f0f0f0;
        }

        .suggested-wt {
            text-align: center;
            background: #D6EAFF;
            color: #0000CC;
            font-weight: bold;
        }

        .input-cell {
            text-align: center;
            background: #FFF3CD;
        }

        .input-cell input {
            width: 70px;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 13px;
            text-align: center;
            font-weight: bold;
        }

        .next-wt {
            text-align: center;
            background: #D4EDDA;
            color: #006400;
            font-weight: bold;
        }

        .done {
            text-align: center;
        }

        .done-check {
            font-size: 18px;
        }

        .notes {
            font-size: 12px;
            color: #666;
            max-width: 150px;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding: 0 30px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-card .label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            color: #1A1A2E;
        }

        @media (max-width: 1024px) {
            .table-wrapper {
                overflow-x: auto;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px 6px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 15px;
                border-radius: 6px 6px 0 0;
            }

            .header h1 {
                font-size: 18px;
                margin-bottom: 5px;
            }

            .header p {
                font-size: 12px;
            }

            .controls {
                grid-template-columns: 1fr;
                padding: 15px;
                gap: 12px;
            }

            .control-group select,
            .control-group input {
                padding: 8px 10px;
                font-size: 14px;
            }

            .info-banner {
                margin: 0 15px 15px 15px;
                padding: 10px 12px;
                font-size: 12px;
            }

            .stats {
                margin: 0 15px 15px 15px;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-card {
                padding: 12px;
            }

            .stat-card .label {
                font-size: 10px;
            }

            .stat-card .value {
                font-size: 20px;
            }

            table {
                font-size: 11px;
            }

            th, td {
                padding: 6px 4px;
            }

            .exercise-name {
                min-width: 100px;
            }

            .input-cell input {
                width: 50px;
                padding: 4px 6px;
                font-size: 12px;
            }

            .notes {
                max-width: 100px;
                font-size: 10px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 16px;
            }

            .controls {
                padding: 12px;
                gap: 10px;
            }

            .stats {
                grid-template-columns: 1fr;
                margin: 0 12px 12px 12px;
            }

            .table-wrapper {
                border-radius: 0 0 6px 6px;
                margin: 0 -10px -10px -10px;
            }

            table {
                font-size: 10px;
            }

            th, td {
                padding: 4px 3px;
            }

            .input-cell input {
                width: 40px;
                padding: 3px 4px;
                font-size: 11px;
            }
        }
    </style>
</head>

        function updateWorkout() {
            const week = parseInt(document.getElementById("weekSelect").value);
            const day = document.getElementById("daySelect").value;
            
            const exercises = programData.filter(e => e.w === week && e.d === day);
            const tableBody = document.getElementById("tableBody");
            const statsContainer = document.getElementById("statsContainer");
            
            if (exercises.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="13" class="empty-message">No exercises for this day</td></tr>';
                statsContainer.innerHTML = '';
                return;
            }

            let html = '';
            let totalSets = 0;
            let totalExercises = 0;
            const seenExercises = new Set();

            exercises.forEach((ex, idx) => {
                totalSets++;
                if (!seenExercises.has(ex.e)) {
                    totalExercises++;
                    seenExercises.add(ex.e);
                }

                const key = `${week}-${day}-${idx}`;
                const savedData = loadSavedData();
                const actualWt = savedData[`${key}-wt`] || '';
                const actualReps = savedData[`${key}-reps`] || '';
                
                let nextWt = '—';
                if (actualWt && actualReps) {
                    const inc = parseInt(document.getElementById('incInput').value) || 5;
                    nextWt = parseInt(actualReps) >= 10 ? (parseInt(actualWt) + inc) : actualWt;
                }

                html += `<tr>
                    <td class="exercise-name">${ex.e}</td>
                    <td>${ex.g}</td>
                    <td>${ex.h}</td>
                    <td class="set-num">${ex.set}</td>
                    <td class="reps">${ex.rL}-${ex.rH}</td>
                    <td class="rir">${ex.r}</td>
                    <td class="suggested-wt">${ex.b || '—'}</td>
                    <td class="input-cell"><input type="number" class="actual-wt" data-key="${key}-wt" data-index="${idx}" onchange="saveData()" value="${actualWt}"></td>
                    <td class="input-cell"><input type="number" class="actual-reps" data-key="${key}-reps" data-index="${idx}" onchange="saveData()" value="${actualReps}"></td>
                    <td class="input-cell"><input type="number" class="actual-rir" data-key="${key}-rir" data-index="${idx}" onchange="saveData()" value="${savedData[`${key}-rir`] || ''}"></td>
                    <td class="next-wt">${nextWt}</td>
                    <td class="done"><span class="done-check">${(actualWt && actualReps) ? '✓' : ''}</span></td>
                    <td class="notes">${ex.n}</td>
                </tr>`;
            });

            tableBody.innerHTML = html;
            statsContainer.innerHTML = `
                <div class="stat-card"><div class="label">Exercises</div><div class="value">${totalExercises}</div></div>
                <div class="stat-card"><div class="label">Total Sets</div><div class="value">${totalSets}</div></div>
                <div class="stat-card"><div class="label">Session</div><div class="value">${exercises[0].s}</div></div>
            `;
        }

        function loadSavedData() {
            const saved = localStorage.getItem('workoutData');
            return saved ? JSON.parse(saved) : {};
        }

        function saveData() {
            const savedData = loadSavedData();
            document.querySelectorAll('input').forEach(input => {
                const key = input.dataset.key;
                if (key) savedData[key] = input.value;
            });
            localStorage.setItem('workoutData', JSON.stringify(savedData));
            updateWorkout();
        }

        document.addEventListener('DOMContentLoaded', updateWorkout);
